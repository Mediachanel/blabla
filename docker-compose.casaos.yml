services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sisdmk2-app:latest
    container_name: sisdmk2-app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      APP_ORIGIN: ${APP_ORIGIN:-}
      ALLOW_INSECURE_LOCAL_HTTP: ${ALLOW_INSECURE_LOCAL_HTTP:-false}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      POSTGRES_HOST: ${POSTGRES_HOST:-pasir-postgres}
      POSTGRES_HOSTS: ${POSTGRES_HOSTS:-pasir-postgres,host.docker.internal,172.17.0.1,postgres,db,127.0.0.1}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-si_data}
      POSTGRES_DATABASES: ${POSTGRES_DATABASES:-si_data}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_CONNECT_TIMEOUT_MS: ${POSTGRES_CONNECT_TIMEOUT_MS:-1500}
    ports:
      - "${APP_PORT:-8080}:3000"
    volumes:
      - ./storage:/app/storage
    networks:
      - sisdmk2-network

networks:
  sisdmk2-network:
    external: true
