services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sisdmk2-app:latest
    container_name: sisdmk2-app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      APP_ORIGIN: ${APP_ORIGIN:-}
      MYSQL_HOST: ${MYSQL_HOST:-mariadb}
      MYSQL_HOSTS: ${MYSQL_HOSTS:-mariadb,host.docker.internal,172.17.0.1,172.31.254.56,127.0.0.1}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-si_data}
      MYSQL_DATABASES: ${MYSQL_DATABASES:-si_data}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_CONNECT_TIMEOUT_MS: ${MYSQL_CONNECT_TIMEOUT_MS:-1500}
    ports:
      - "${APP_PORT:-8080}:3000"
    volumes:
      - ./storage:/app/storage
