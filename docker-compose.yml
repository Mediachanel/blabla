services:
  db:
    image: postgres:16-alpine
    container_name: sisdmk2-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-si_data}
      POSTGRES_USER: ${POSTGRES_USER:-sisdmk2_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - sisdmk2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sisdmk2-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: db
      POSTGRES_HOSTS: db,postgres,host.docker.internal,172.17.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-sisdmk2_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-si_data}
      POSTGRES_DATABASES: ${POSTGRES_DATABASES:-si_data}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      APP_ORIGIN: ${APP_ORIGIN:-}
    ports:
      - "${APP_PORT:-8080}:3000"
    volumes:
      - sisdmk2_uploads:/app/storage

volumes:
  sisdmk2_postgres_data:
  sisdmk2_uploads:
