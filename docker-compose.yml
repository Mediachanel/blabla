services:
  db:
    image: mysql:8.0
    container_name: sisdmk2-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Tianh@7}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-si_data}
      MYSQL_USER: ${MYSQL_USER:-sisdmk2_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sisdmk2_pass}
    ports:
      - "${MYSQL_PUBLIC_PORT:-3307}:3306"
    volumes:
      - sisdmk2_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sisdmk2-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MYSQL_HOST: ${MYSQL_HOST:-db}
      MYSQL_HOSTS: ${MYSQL_HOSTS:-db,mariadb,mysql,host.docker.internal,172.17.0.1,172.31.254.56,127.0.0.1}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-sisdmk2_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sisdmk2_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-si_data}
      JWT_SECRET: ${JWT_SECRET:-sisdmk2-secret-ganti-nanti}
    ports:
      - "${APP_PORT:-8080}:3000"

volumes:
  sisdmk2_mysql_data:
